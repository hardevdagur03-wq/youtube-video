{% extends "base.html" %}
{% block title %}Export Result — {{ run_id }}{% endblock %}
{% block content %}

<section class="section" style="padding-top:120px;">
  <div class="container-md mx-auto">

    <div id="progress-view">
      <div class="card" style="padding:40px;text-align:center;">
        <div class="spinner-wrap mx-auto mb-4">
          <div class="spinner"></div>
        </div>
        <h4 class="mb-1">Fetching videos...</h4>
        <p class="text-muted text-sm mb-4" id="progress-detail">Starting</p>
        <div style="max-width:440px;margin:0 auto;">
          <div class="card" style="padding:8px 20px;background:var(--gray-50);border-color:var(--gray-100);text-align:left;">
            <ul class="step-list" id="step-list"></ul>
          </div>
        </div>
      </div>
    </div>

    <div id="result-view" class="d-none">
      <div class="card card-hover card-accent mb-4">
        <div class="d-flex align-center justify-between flex-wrap gap-3">
          <div>
            <h4 class="mb-1" id="channel-title"></h4>
            <p class="text-muted text-sm mono mb-0" id="channel-id"></p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="badge badge-green">&#10003; Complete</span>
            <a id="download-link" class="btn btn-primary btn-sm" href="#">
              <svg height="14" viewBox="0 0 16 16" width="14" fill="currentColor">
                <path d="M2.5 1.75a.25.25 0 01.25-.25h8.5a.25.25 0 01.25.25v7.736a.75.75 0 001.5 0V1.75A1.75 1.75 0 0011.25 0h-8.5A1.75 1.75 0 001 1.75v12.5c0 .966.784 1.75 1.75 1.75h3.5a.75.75 0 000-1.5h-3.5a.25.25 0 01-.25-.25V1.75z"></path>
                <path d="M6.61 7.735a.75.75 0 00-1.06 0l-2.875 2.87a.75.75 0 101.06 1.061l2.515-2.514 3.895 5.256a.75.75 0 001.201-.898L6.61 7.735z"></path>
              </svg>
              Download CSV
            </a>
          </div>
        </div>
      </div>
      <div class="stat-grid stagger-children" id="stat-cards"></div>
      <div style="text-align:center;margin-top:24px;">
        <a href="/" class="btn btn-outline btn-sm">Export another channel</a>
      </div>
    </div>

    <div id="error-view" class="d-none">
      <div class="alert alert-danger">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <div>
            <h4 style="margin-bottom:4px;color:inherit;font-size:15px;">Export failed</h4>
            <p style="margin:0;color:inherit;font-size:14px;" id="error-message"></p>
            <a href="/" class="btn btn-sm btn-outline mt-3" style="border-color:#fca5a5;color:#991b1b;">Try again</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
var RUN_ID = "{{ run_id }}";

function updateProgress(data) {
  var list = document.getElementById("step-list");
  var detail = document.getElementById("progress-detail");
  list.innerHTML = "";
  var current = "";
  for (var i = 0; i < data.steps.length; i++) {
    var s = data.steps[i];
    var li = document.createElement("li");
    li.className = "step-item step-enter";
    if (s.status === "running") {
      li.innerHTML = '<span class="step-icon"><span class="spinner spinner-sm" style="display:inline-block;"></span></span> ' + esc(s.name) + '...';
      current = s.name;
    } else if (s.status === "ok") {
      li.innerHTML = '<span class="step-icon text-success">&#10003;</span> ' + esc(s.name) + ' <span class="text-muted text-sm">' + esc(s.detail) + '</span>';
    } else if (s.status === "error") {
      li.innerHTML = '<span class="step-icon text-danger">&#10007;</span> ' + esc(s.name) + ' <span class="text-muted text-sm">' + esc(s.detail) + '</span>';
    } else {
      li.innerHTML = '<span class="step-icon text-muted">&#9679;</span> ' + esc(s.name);
    }
    list.appendChild(li);
  }
  if (current) detail.textContent = current;
}

function showDashboard(result) {
  document.getElementById("progress-view").classList.add("d-none");
  if (!result.success) {
    document.getElementById("error-view").classList.remove("d-none");
    document.getElementById("error-message").textContent = result.error || "Unknown error occurred during export.";
    return;
  }
  document.getElementById("result-view").classList.remove("d-none");
  document.getElementById("channel-title").textContent = result.channel_title;
  document.getElementById("channel-id").textContent = result.channel_id;
  document.getElementById("download-link").href = "/api/download/" + RUN_ID;
  document.getElementById("stat-cards").innerHTML = [
    { label: "Videos exported", value: (result.total_videos || 0).toLocaleString() },
    { label: "Total discovered", value: (result.total_discovered || 0).toLocaleString() },
    { label: "API calls", value: result.total_api_calls || 0 },
    { label: "File size", value: ((result.file_size_bytes || 0) / 1024).toFixed(0) + " KB" }
  ].map(function(c) {
    return '<div class="stat-card"><div class="stat-value">' + c.value + '</div><div class="stat-label">' + c.label + '</div></div>';
  }).join("");
}

function poll() {
  fetch("/api/progress/" + RUN_ID)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      updateProgress(data);
      if (data.complete) {
        fetch("/api/result/" + RUN_ID)
          .then(function(r) { return r.json(); })
          .then(showDashboard);
      } else {
        setTimeout(poll, 1200);
      }
    })
    .catch(function() { setTimeout(poll, 1200); });
}
poll();

function esc(str) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}
</script>
{% endblock %}
