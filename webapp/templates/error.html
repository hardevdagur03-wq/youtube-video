{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<section class="section" style="padding-top:120px;">
  <div class="container-sm mx-auto text-center">
    <div class="alert alert-danger" style="text-align:left;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <div>
          <h4 style="margin-bottom:4px;color:inherit;font-size:15px;">Something went wrong</h4>
          <p style="margin:0;color:inherit;font-size:14px;">{{ message }}</p>
        </div>
      </div>
    </div>
    <a href="/" class="btn btn-primary mt-4">Go home</a>
  </div>
</section>
{% endblock %}
